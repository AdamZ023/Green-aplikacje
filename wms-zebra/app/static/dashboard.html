<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WMS</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260527-1">
</head>
<body>
  <a class="qr-launch" href="/zebra-v2?v=20260527-1" aria-label="Otworz skaner">
    <img src="/scanner-qr.svg?v=20260527-1" alt="QR do skanera">
  </a>

  <main class="shell">
    <section class="topbar">
      <div>
        <h1>WMS</h1>
        <p>Centralny stan magazynowy</p>
      </div>
      <input id="apiKey" type="password" placeholder="Klucz API">
    </section>

    <section class="toolbar">
      <button id="refresh">Odswiez</button>
      <button id="warehouseViewButton" type="button">Stan Magazynowy</button>
      <button id="logisticsViewButton" type="button">Stan Logistyczny</button>
      <button id="historyViewButton" type="button">Historia operacji</button>
      <a class="button-link" href="/zebra-v2?v=20260527-1">Skaner</a>
    </section>

    <section id="warehouseView" class="dashboard-view">
      <h2>Stan Magazynowy</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>EAN</th>
              <th>Indeks</th>
              <th>Nazwa</th>
              <th>Magazyn</th>
              <th>Ilosc</th>
              <th>Skan</th>
              <th>Operator</th>
              <th>ID skanera</th>
            </tr>
          </thead>
          <tbody id="warehouseRows"></tbody>
        </table>
      </div>
    </section>

    <section id="logisticsView" class="dashboard-view hidden">
      <h2>Stan Logistyczny</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>EAN</th>
              <th>Indeks</th>
              <th>Nazwa</th>
              <th>Lokalizacja</th>
              <th>Ilosc</th>
              <th>Skan</th>
              <th>Operator</th>
              <th>ID skanera</th>
            </tr>
          </thead>
          <tbody id="logisticsRows"></tbody>
        </table>
      </div>
    </section>

    <section id="operationHistoryView" class="dashboard-view hidden">
      <h2>Historia operacji</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Skan</th>
              <th>Operacja</th>
              <th>EAN</th>
              <th>Indeks</th>
              <th>Nazwa</th>
              <th>Z lokalizacji</th>
              <th>Do lokalizacji</th>
              <th>Ilosc</th>
              <th>Operator</th>
              <th>ID skanera</th>
            </tr>
          </thead>
          <tbody id="historyRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/static/dashboard.js?v=20260527-1"></script>
</body>
</html>
