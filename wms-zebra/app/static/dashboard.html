<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WMS</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260526-2">
</head>
<body>
  <a class="qr-launch" href="/zebra-v2?v=20260526-2" aria-label="Otworz skaner">
    <img src="/scanner-qr.svg?v=20260526-2" alt="QR do skanera">
  </a>

  <main class="shell">
    <section class="topbar">
      <div>
        <h1>WMS</h1>
        <p>Centralny stan magazynowy</p>
      </div>
      <input id="apiKey" type="password" placeholder="Klucz API">
    </section>

    <section class="toolbar">
      <button id="refresh">Odswiez</button>
      <a class="button-link" href="/zebra-v2?v=20260526-2">Skaner</a>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>EAN</th>
            <th>Indeks</th>
            <th>Nazwa</th>
            <th>Lokalizacja</th>
            <th>Ilosc</th>
            <th>Skan</th>
            <th>Operator</th>
            <th>ID skanera</th>
          </tr>
        </thead>
        <tbody id="stockRows"></tbody>
      </table>
    </section>

    <section class="history-section">
      <h2>Historia skanow</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Skan</th>
              <th>Operacja</th>
              <th>EAN</th>
              <th>Indeks</th>
              <th>Nazwa</th>
              <th>Z lokalizacji</th>
              <th>Do lokalizacji</th>
              <th>Ilosc</th>
              <th>Operator</th>
              <th>ID skanera</th>
            </tr>
          </thead>
          <tbody id="historyRows"></tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="/static/dashboard.js?v=20260526-2"></script>
</body>
</html>
