<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WMS</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260525-2">
</head>
<body>
  <a class="qr-launch" href="/scanner?v=20260525-2" aria-label="Otworz skaner">
    <img src="/scanner-qr.svg?v=20260525-2" alt="QR do skanera">
  </a>

  <main class="shell">
    <section class="topbar">
      <div>
        <h1>WMS</h1>
        <p>Centralny stan magazynowy</p>
      </div>
      <input id="apiKey" type="password" placeholder="Klucz API">
    </section>

    <section class="toolbar">
      <button id="refresh">Odswiez</button>
      <a class="button-link" href="/scanner?v=20260525-2">Skaner</a>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>EAN</th>
            <th>Indeks</th>
            <th>Nazwa</th>
            <th>Lokalizacja</th>
            <th>Ilosc</th>
            <th>Operator</th>
            <th>ID skanera</th>
          </tr>
        </thead>
        <tbody id="stockRows"></tbody>
      </table>
    </section>
  </main>
  <script src="/static/dashboard.js?v=20260525-2"></script>
</body>
</html>
