<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Skaner WMS</title>
  <link rel="stylesheet" href="/static/styles.css?v=20260527-2">
</head>
<body class="scanner-body">
  <main class="scanner">
    <section class="topbar compact scanner-topbar">
      <div>
        <h1>Skaner WMS</h1>
        <p>Zebra / przegladarka</p>
      </div>
      <a class="button-link" href="/">Panel</a>
    </section>

    <section id="loginView" class="form view-panel">
      <h2>Logowanie</h2>
      <label class="hidden">Klucz API<input id="apiKey" type="password" autocomplete="off"></label>
      <label>ID skanera<input id="scannerId" readonly placeholder="Nadawany automatycznie"></label>
      <label>Operator<input id="operator" required autocomplete="off"></label>
      <button id="loginButton" type="button">Rozpocznij prace</button>
      <button id="newScannerId" class="secondary" type="button">Nadaj nowe ID</button>
    </section>

    <section id="operationView" class="form view-panel hidden">
      <h2>Wybierz operacje</h2>
      <div class="scanner-summary">
        <strong id="sessionScannerId"></strong>
        <span id="sessionOperator"></span>
      </div>
      <div class="operation-grid">
        <button id="chooseReceive" type="button">Przyjecie</button>
        <button id="chooseMove" type="button">Przesuniecie</button>
      </div>
      <button id="changeOperator" class="secondary" type="button">Zmien operatora</button>
    </section>

    <section id="receivePanel" class="form workflow-panel hidden">
      <h2>Przyjecie</h2>
      <output id="receiveResult" class="operation-result hidden"></output>
      <div class="scan-target active" data-target="receiveSku">
        <span>SKU / kod</span>
        <strong id="receiveSkuValue">Zeskanuj produkt</strong>
      </div>
      <div class="scan-target" data-target="receiveLocation">
        <span>Lokalizacja</span>
        <strong id="receiveLocationValue">Zeskanuj lokalizacje</strong>
      </div>
      <div class="inline-actions">
        <button id="receiveQtyButton" type="button">Wprowadz ilosc</button>
        <strong id="receiveQtyValue">1 szt.</strong>
      </div>
      <div class="actions">
        <button id="receiveReset" type="button">Wyczysc</button>
        <button class="secondary backToOperations" type="button">Wroc</button>
      </div>
    </section>

    <section id="movePanel" class="form workflow-panel hidden">
      <h2>Przesuniecie</h2>
      <output id="moveResult" class="operation-result hidden"></output>
      <div class="scan-target active" data-target="moveSku">
        <span>SKU / kod</span>
        <strong id="moveSkuValue">Zeskanuj produkt</strong>
      </div>
      <div class="scan-target" data-target="moveFrom">
        <span>Z lokalizacji</span>
        <strong id="moveFromValue">Zeskanuj lokalizacje zrodlowa</strong>
      </div>
      <div class="scan-target" data-target="moveTo">
        <span>Do lokalizacji</span>
        <strong id="moveToValue">Zeskanuj lokalizacje docelowa</strong>
      </div>
      <label>Ilosc<input id="moveQuantity" type="number" min="1" required value="1"></label>
      <div class="actions">
        <button id="moveSubmit" type="button">Przesun</button>
        <button id="moveReset" type="button">Wyczysc</button>
        <button class="secondary backToOperations" type="button">Wroc</button>
      </div>
    </section>

    <output id="status" class="status"></output>
    <input
      id="scanCapture"
      class="scan-capture"
      type="text"
      inputmode="none"
      autocomplete="off"
      autocapitalize="off"
      spellcheck="false"
      aria-hidden="true"
      tabindex="-1"
    >
  </main>
  <script src="/static/scanner.js?v=20260527-2"></script>
</body>
</html>
