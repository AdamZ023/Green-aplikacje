services:
  - type: web
    name: wms-zebra-api
    env: python
    plan: starter
    rootDir: wms-zebra
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wms-zebra-db
          property: connectionString
      - key: WMS_API_KEY
        generateValue: true
      - key: WMS_PUBLIC_URL
        value: https://UZUPELNIJ-PO-WDROZENIU

databases:
  - name: wms-zebra-db
    plan: starter
