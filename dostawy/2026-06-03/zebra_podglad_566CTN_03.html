function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]))}
function uniqText(items){const out=[];(items||[]).forEach(v=>{const t=String(v||"").trim();if(t&&out.indexOf(t)<0)out.push(t)});return out}
function palletInfoData(palNo){const pal=DATA.pallets?DATA.pallets[String(palNo)]:null,boxes=pal&&Array.isArray(pal.boxes)?pal.boxes:[];const kinds=uniqText(boxes.map(b=>String(b.rodzaj||"").toLowerCase().includes("prepak")?"PRE":"LUZ"));return{kind:kinds.join(" / ")||"-",models:uniqText(boxes.map(b=>b.model)).join(" / ")||"-",colours:uniqText(boxes.map(b=>b.colour)).join(" / ")||"-",count:boxes.length}}
function showPalletInfo(palNo){const info=palletInfoData(palNo);palletInfoTitle.textContent="Paleta "+palNo;palletInfoBody.innerHTML=`<b>PRE/LUZ</b><span>${esc(info.kind)}</span><b>MDK</b><span>${esc(info.models)}</span><b>COLOUR</b><span>${esc(info.colours)}</span><b>ILOSC KARTONOW NA PALECIE</b><span>${info.count}</span>`;palletInfo.classList.add("open");$("palletInfoClose").focus()}
function hidePalletInfo(){palletInfo.classList.remove("open")}
function renderHero(res,p){const palNo=p?p.paleta:"--",count=p?p.count:"--",total=res&&res.item?res.item.total:"--",palTotal=p?palletTotal(p.paleta):"--",alok=hasAllocation(p)?firstText(p.allocations):"";hero.innerHTML=`<div class="palletNo">${p?"PALETA "+palNo:"--"}</div><div class="eanLine">${p?firstText(p.models):"Brak skanu"}</div>${alok?`<div class="allocationLine">${alok}</div>`:""}<div class="facts"><div class="fact"><b>Na tej palecie</b><span>${count}</span></div><div class="fact"><b>Lacznie w dostawie</b><span>${total}</span></div><div class="fact"><b>Lacznie na palecie</b><span>${palTotal}</span></div><div class="fact"><b>Rodzaj</b><span>${p?firstText(p.kinds).toUpperCase():"--"}</span></div><div class="fact"><b>Kolor / rozmiar</b><span>${p?firstText(p.colours)+" / "+firstText(p.sizes):"--"}</span></div></div>`}
function renderPicks(res,activePal){const item=res?res.item:null;picks.innerHTML="";if(!item||!Array.isArray(item.pallets)||item.pallets.length<=1)return;item.pallets.forEach(p=>{const btn=document.createElement("button");btn.type="button";btn.className="pick"+(String(p.paleta)===String(activePal)?" active":"");btn.innerHTML=`<strong>PALETA ${p.paleta}</strong><span>${p.count} kart. tego ${res.type==="ean"?"EAN":"ART.NR"}</span>`;btn.addEventListener("click",()=>selectPallet(res,p.paleta,true));picks.appendChild(btn)})}
function renderMap(res,palNo){const pal=DATA.pallets[String(palNo)];grid.innerHTML="";if(!pal){grid.innerHTML='<div class="empty">Brak danych palety.</div>';return}mapTitle.textContent="Podglad palety "+palNo+" - czarna ramka = "+(res&&res.type==="ean"?"zeskanowany EAN":"ART.NR z kartonu");for(let s=1;s<=4;s++){const stack=document.createElement("div");stack.className="stack";stack.setAttribute("data-title","SLUP "+s);const boxes=pal.boxes.filter(b=>Number(b.slup)===s).sort((a,b)=>Number(a.warstwa||0)-Number(b.warstwa||0));if(boxes.length===0){const empty=document.createElement("div");empty.className="empty";empty.textContent="pusty";stack.appendChild(empty)}else{boxes.forEach(b=>{const hit=boxMatches(b,res),div=document.createElement("div");div.className="box "+(hit?"hit":"dim");div.style.background=boxBg(b);div.style.color=boxTextColor(b);div.textContent=hit?(b.label||"MODEL"):(b.modelShort||"");stack.appendChild(div)})}grid.appendChild(stack)}}
function renderReport(){const rows=(DATA.report&&Array.isArray(DATA.report.rows))?DATA.report.rows:[];let html='<table class="palletTable"><thead><tr><th>MODELOKOLOR</th><th>COLOUR</th><th>PRE</th><th>LUZ</th></tr></thead><tbody>';if(rows.length===0){html+='<tr><td colspan="4">Brak danych palet.</td></tr>'}else{rows.forEach(r=>{html+=`<tr><td class="modelCell" title="${esc(r.model)}">${esc(r.modelShort||r.model)}</td><td>${esc(r.colour||"")}</td><td>${(r.pre||[]).length||""}</td><td>${(r.luz||[]).length||""}</td></tr>`})}html+=`</tbody><tfoot><tr><td>suma</td><td></td><td>${DATA.report?DATA.report.sumPre||0:0}</td><td>${DATA.report?DATA.report.sumLuz||0:0}</td></tr></tfoot></table>`;reportTable.innerHTML=html;const side=(title,key)=>`<div><div class="mapColumnTitle">${title}</div><div class="mapRows">${rows.map(r=>`<div class="palletMapRow">${((r[key]||[]).length?(r[key]||[]):[""]).map(n=>n?`<div class="palletBox" role="button" tabindex="0" data-pal="${n}">${n}</div>`:'<div class="palletBox blank"></div>').join("")}</div>`).join("")}</div></div>`;reportMap.innerHTML=side("PRE","pre")+side("LUZ","luz")}
function openReport(){renderReport();reportModal.classList.add("open");setTimeout(()=>$("reportClose").focus(),0)}
function closeReport(){hidePalletInfo();reportModal.classList.remove("open");scan.focus();scan.select()}
function openHangTagAlert(){const tokens=((DATA.hangTagAlert||{}).tokens||[]);if(!tokens.length)return;$("hangTagAlertBody").innerHTML=`W DOSTAWIE WYST&#280;PUJ&#260;:<br>${esc(tokens.join(", "))}<br><br>SPRAWD&#377; OZNACZENIE KOLORU NA TOWARZE!<br><br>JE&#346;LI KOLOR JEST B&#321;&#280;DNY NAKLEJ ETYKIET&#280; NA KARTON:`;hangTagAlert.classList.add("open");beep("error");setTimeout(()=>beep("error"),520);setTimeout(()=>$("hangTagAlertClose").focus(),0)}
function closeHangTagAlert(){hangTagAlert.classList.remove("open");openReport()}
function selectPallet(res,palNo,manual){const item=res?res.item:null;if(!item)return;const p=item.pallets.find(x=>String(x.paleta)===String(palNo))||item.pallets[0];renderHero(res,p);renderPicks(res,p.paleta);renderMap(res,p.paleta);setStatus(item.pallets.length>1?res.label+" jest na kilku paletach. Wybrano palete "+p.paleta+".":"Znaleziono "+res.label+".",false);if(!manual)playScanSound(p);scan.focus();scan.select()}
function handleScan(raw){const val=String(raw||"").trim();if(!val)return;lastHandled=val;const res=resolveLookup(val);if(!res){picks.innerHTML="";renderHero(null,null);grid.innerHTML='<div class="empty">Nie znaleziono: '+val+'</div>';mapTitle.textContent="Podglad palety";setStatus("Nie znaleziono EAN ani ART.NR: "+val,true);beep("error");scan.focus();scan.select();return}selectPallet(res,res.item.pallets[0].paleta,false)}
function scheduleScan(){clearTimeout(scanTimer);const val=String(scan.value||"").trim();if(val.length<8||val===lastHandled)return;scanTimer=setTimeout(()=>{const now=String(scan.value||"").trim();if(now.length>=8&&now!==lastHandled)handleScan(now)},180)}
scan.addEventListener("input",scheduleScan);scan.addEventListener("keydown",ev=>{if(ev.key==="Enter"||ev.key==="Tab"){ev.preventDefault();handleScan(scan.value)}});scan.addEventListener("change",()=>handleScan(scan.value));$("clearBtn").addEventListener("click",()=>{scan.value="";lastHandled="";scan.focus();scan.select();setStatus("Gotowe do skanowania.",false)});$("reportBtn").addEventListener("click",openReport);$("reportClose").addEventListener("click",closeReport);$("hangTagAlertClose").addEventListener("click",closeHangTagAlert);$("palletInfoClose").addEventListener("click",hidePalletInfo);reportMap.addEventListener("click",ev=>{const box=ev.target.closest(".palletBox[data-pal]");if(box)showPalletInfo(box.getAttribute("data-pal"))});reportMap.addEventListener("keydown",ev=>{const box=ev.target.closest(".palletBox[data-pal]");if(box&&(ev.key==="Enter"||ev.key===" ")){ev.preventDefault();showPalletInfo(box.getAttribute("data-pal"))}});reportModal.addEventListener("click",ev=>{if(ev.target===reportModal)closeReport()});document.addEventListener("keydown",ev=>{if(ev.key==="Escape"&&hangTagAlert.classList.contains("open")){closeHangTagAlert();return}if(ev.key==="Escape"&&palletInfo.classList.contains("open")){hidePalletInfo();return}if(ev.key==="Escape"&&reportModal.classList.contains("open"))closeReport()});window.addEventListener("load",()=>{if(((DATA.hangTagAlert||{}).tokens||[]).length)openHangTagAlert();else openReport()});document.body.addEventListener("click",ev=>{if(!reportModal.classList.contains("open")&&!hangTagAlert.classList.contains("open")&&!ev.target.closest("button"))scan.focus()});
</script></body></html>
