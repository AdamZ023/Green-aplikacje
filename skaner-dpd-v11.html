0}.status.bad,.status.warn{font-size:20px;font-weight:900}.status.bad small,.status.warn small{font-size:15px;font-weight:800;color:#b42318}body.client-mode{padding-bottom:28px}body.client-mode .workflow,body.client-mode .advanced-note,body.client-mode .sync-health{display:none}body.client-mode .config,body.client-mode .session,body.client-mode .scan-step{border:0!important;background:transparent!important;padding:0!important}body.client-mode .author-credit{font-size:11px;right:6px;bottom:5px}body.client-mode .stage-icon{width:38px;height:38px;margin-right:8px}@media(max-width:520px){.app-logo{width:30px;height:30px}.author-credit{font-size:11px}.import-head{display:block}.import-limit{margin:4px 0 0;text-align:left}.row.config{grid-template-columns:1fr!important}}' +

          "function extractTracking(v){const n=normTrack(v),preferred=n.match(/10\\d{11}U/);return preferred?preferred[0]:''}"

          "render();sync.applying=false;const importCount=Object.keys(state.trackingMap||{}).length;setStatus(IS_CLIENT&&importCount?'Baza pobrana':'Sesja zsynchronizowana',IS_CLIENT?'Pozycji importu: '+importCount+'. Można skanować.':'Skanów: '+state.scans.length,'ok')"

        html = html.replace(
          "render();sync.applying=false;setStatus('Sesja zsynchronizowana','Skanow: '+state.scans.length,'ok')",

          "const link='https://adamz023.github.io/Green-aplikacje/skaner-dpd-v11.html?v=20260617-5&join='+encodeURIComponent(code);sessionLink.textContent=link;qr.src='https://api.qrserver.com/v1/create-qr-code/?size=320x320&data='+encodeURIComponent(link);qr.hidden=false;updateZebraClients();"

        );
        html = html.replace(
          "el('saveMapBtn').onclick=()=>{const parsed=parseTrackingMap(mappingInput.value);state.trackingMap=parsed.map;saveMap();render();setStatus('Import zapisany','Wczytano pozycje Verto: '+parsed.count+'. Ecomm: '+parsed.ecomm+'. Poza Ecomm: '+parsed.notEcomm+'.',parsed.count?'ok':'warn')};",
          "el('saveMapBtn').onclick=()=>{const parsed=parseTrackingMap(mappingInput.value);if(parsed.count>2000){setStatus('Import za duży','Maksymalny limit to 2000 pozycji. Zalecane do płynnej pracy: do 1000 pozycji.','bad');const h=document.getElementById('syncHealth');if(h)h.textContent='Import odrzucony: przekroczono limit 2000 pozycji.';return}if(!parsed.count||!parsed.ecomm){setStatus('Import wygląda nieprawidłowo','Nie znaleziono pozycji Ecomm. Sprawdź kolumny z Verto. Tracking DPD powinien zaczynać się od 10 i kończyć U.','bad');const h=document.getElementById('syncHealth');if(h)h.textContent='Import odrzucony: 0 pozycji Ecomm albo zły format trackingów.';return}if(parsed.count>1000&&!confirm('Import ma '+parsed.count+' pozycji. To może spowolnić Zebrę. Zalecane jest do 1000 pozycji. Kontynuować?'))return;if((state.scans.length||sync.peer||sync.conn)&&!confirm('Zmiana importu unieważni obecny QR i powinna rozpocząć nową sesję. Kontynuować?'))return;state.trackingMap=parsed.map;saveMap();render();setStatus('Import zapisany','Wczytano pozycje Verto: '+parsed.count+'. Ecomm: '+parsed.ecomm+'. Poza Ecomm: '+parsed.notEcomm+'.','ok');const h=document.getElementById('syncHealth');if(h)h.textContent='Import zapisany. Teraz kliknij Utwórz sesję dla Zebry.'};"
        );
        html = html.replace(
          "sync.conn.on('open',()=>{setSession('Polaczono z sesja '+code,'ok');sync.conn.send({type:'state',payload:payload()})})",
          "sync.conn.on('open',()=>{setSession('Połączono z sesją '+code,'ok');setStatus('Pobieram bazę z komputera','Nie skanuj jeszcze. Czekam na synchronizację importu i skanów.','warn');let asks=0;const askState=()=>{if(sync.conn&&sync.conn.open&&(!state.trackingMap||!Object.keys(state.trackingMap).length)){sync.conn.send({type:'request-state'});asks++;if(asks===4)setStatus('NADAL CZEKAM NA BAZĘ','Połączenie otwarte, ale komputer nie odesłał bazy. Sprawdź, czy na komputerze widać: Zebra połączona.','warn')}};askState();setTimeout(askState,800);setTimeout(askState,2000);setTimeout(askState,5000);setTimeout(()=>{if(!state.trackingMap||!Object.keys(state.trackingMap).length)setStatus('BRAK BAZY Z KOMPUTERA','Zamknij tę kartę, utwórz nową sesję na komputerze i zeskanuj nowy QR. Jeśli problem wraca tylko na tym skanerze, Chrome/WebRTC na tym urządzeniu blokuje połączenie.','bad')},12000)})"

        html = html.replace(

          "sync.peer.on('connection',conn=>{sync.clients.push(conn);updateZebraClients();wire(conn);const sendInitial=()=>{sync.clients=sync.clients.filter(c=>c&&c.open);updateZebraClients();if(!conn.open)return;conn.send({type:'state',payload:payload()});setSession('Zebra połączona. Sesja: '+code,'ok')};conn.on('open',sendInitial);conn.on('close',updateZebraClients);conn.on('error',updateZebraClients);setTimeout(sendInitial,300);setTimeout(sendInitial,1200);setTimeout(sendInitial,2500)});"
        );
        html = html.replace(
          "function wire(conn){conn.on('data',msg=>{if(!msg||msg.type!=='state')return;applyRemote(msg.payload)});conn.on('close',()=>setSession('Polaczenie zamkniete','warn'));conn.on('error',()=>setSession('Blad polaczenia','bad'))}",
          "function wire(conn){conn.on('data',msg=>{if(!msg)return;if(msg.type==='request-state'&&sync.role==='host'&&conn.open){sync.clients=sync.clients.filter(c=>c&&c.open);updateZebraClients();conn.send({type:'state',payload:payload()});setSession('Zebra połączona. Sesja: '+sessionCode.value,'ok');return}if(msg.type!=='state')return;applyRemote(msg.payload)});conn.on('close',()=>{updateZebraClients();setSession('Połączenie zamknięte','warn');if(IS_CLIENT)setStatus('POŁĄCZENIE PRZERWANE','Zeskanuj nowy QR albo utwórz sesję ponownie.','bad')});conn.on('error',()=>{updateZebraClients();setSession('Błąd połączenia','bad');if(IS_CLIENT)setStatus('BŁĄD POŁĄCZENIA','Zebra nie może połączyć się z komputerem. Utwórz nową sesję i zeskanuj nowy QR.','bad')})}"

        html = html.replace('</body>', '<script>(function(){function closest(el,sel){while(el&&el.nodeType===1){if(el.matches(sel))return el;el=el.parentElement}return null}var panel=document.querySelector("section.panel");var workflow=document.querySelector(".workflow");var importBox=closest(document.getElementById("mappingInput"),"div.config");var session=document.querySelector(".session");var operatorRow=closest(document.getElementById("operator"),".row");var scanBox=closest(document.getElementById("scanInput"),"div");if(scanBox)scanBox.classList.add("scan-step");if(panel&&workflow&&importBox)panel.insertBefore(importBox,workflow.nextSibling);if(panel&&importBox&&operatorRow)panel.insertBefore(operatorRow,importBox.nextSibling);if(panel&&operatorRow&&session)panel.insertBefore(session,operatorRow.nextSibling);if(panel&&session&&scanBox)panel.insertBefore(scanBox,session.nextSibling);if(importBox&&!importBox.querySelector(".import-limit")){var label=importBox.querySelector("label");if(label){var head=document.createElement("div");head.className="import-head";var limit=document.createElement("span");limit.className="import-limit";limit.textContent="zalecane do 1000 | max 2000 pozycji";label.parentNode.insertBefore(head,label);head.appendChild(label);head.appendChild(limit)}}var scanLabel=document.querySelector("label[for=scanInput]");if(scanLabel)scanLabel.textContent="Krok 4: Skanowanie";var opLabel=document.querySelector("label[for=operator]");if(opLabel)opLabel.textContent="Krok 2: Operator [opcjonalnie]";var mode=document.querySelector(".row.config input[disabled]");if(mode){mode.value="Ecomm: 1101H/9101H";mode.title=mode.value}var sessionLabel=document.querySelector("label[for=sessionCode]");if(sessionLabel)sessionLabel.textContent="Krok 3: Sesja dla Zebry";})();<\/script></body>');
